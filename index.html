<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Acesse os principais conteúdos e soluções da WeSell."
    />
    <title>WeSell | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="links-page">
      <header class="profile" aria-label="Perfil WeSell">
        <a
          class="brand"
          href="https://www.instagram.com/wesellsoftware/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Visitar o Instagram da WeSell"
        >
          <img
            class="brand-logo"
            src="./Entregaveis-44.png"
            alt="WeSell"
          />
        </a>
        <a
          class="handle"
          href="https://www.instagram.com/wesellsoftware/"
          target="_blank"
          rel="noopener noreferrer"
        >
          @wesellsoftware
        </a>
      </header>

      <nav class="link-list" aria-label="Links da WeSell">
        <a
          class="banner-link"
          href="https://www.instagram.com/wesellsoftware/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Conheça a We Education"
        >
          <img
            src="./image.png"
            alt="We Education — conteúdo para criar um processo comercial lucrativo"
          />
        </a>

        <a
          class="banner-link"
          href="https://www.instagram.com/wesellsoftware/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Conheça a We Solutions"
        >
          <img
            src="./BANNER 2.jpg"
            alt="We Solutions — encontramos a solução certa para sua empresa"
          />
        </a>

        <a
          class="banner-link"
          href="https://www.instagram.com/wesellsoftware/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Conheça o CRM Wesell"
        >
          <img
            src="./BANNER 3.jpg"
            alt="CRM Wesell — onde seu lead vira cliente"
          />
        </a>

        <a
          class="banner-link"
          href="https://www.instagram.com/wesellsoftware/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Faça o diagnóstico gratuito da sua empresa"
        >
          <img
            src="./image copy 2.png"
            alt="Sua empresa está preparada para escalar? Diagnóstico WeSell gratuito"
          />
        </a>
      </nav>

      <a
        class="cta"
        href="https://www.instagram.com/wesellsoftware/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img src="./image copy.png" alt="De ponta a ponta" />
      </a>
    </main>
  </body>
</html>
