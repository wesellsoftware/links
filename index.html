<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Acesse os principais conteúdos e soluções da WeSell."
    />
    <title>WeSell | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="links-page">
      <header class="profile" aria-label="Perfil WeSell">
        <a
          class="brand"
          href="https://www.instagram.com/wesellsoftware/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Visitar o Instagram da WeSell"
        >
          <img
            class="brand-logo"
            src="./assets/Entregaveis-44.png"
            alt="WeSell"
          />
        </a>
        <a
          class="handle"
          href="https://www.instagram.com/wesellsoftware/"
          target="_blank"
          rel="noopener noreferrer"
        >
          @wesellsoftware
        </a>
      </header>

      <nav class="link-list" aria-label="Links da WeSell">
        <button
          type="button"
          class="banner-link"
          id="waitlist-trigger"
          data-banner="Education"
          aria-haspopup="dialog"
          aria-controls="waitlist-modal"
          aria-label="Inscreva-se na lista de espera da We Education"
        >
          <img
            src="./assets/image.png"
            alt="We Education — conteúdo para criar um processo comercial lucrativo"
          />
        </button>

        <a
          class="banner-link"
          href="https://lp.wesellsoftware.com.br"
          target="_blank"
          rel="noopener noreferrer"
          data-banner="Solutions"
          aria-label="Conheça a We Solutions"
        >
          <img
            src="./assets/BANNER 2.jpg"
            alt="We Solutions — encontramos a solução certa para sua empresa"
          />
        </a>

        <a
          class="banner-link"
          href="https://wa.me/55999202129?text=Ol%C3%A1%2C%20quero%20saber%20mais%20sobre%20o%20CRM!"
          target="_blank"
          rel="noopener noreferrer"
          data-banner="CRM"
          aria-label="Conheça o CRM Wesell no WhatsApp"
        >
          <img
            src="./assets/BANNER 3.jpg"
            alt="CRM Wesell — onde seu lead vira cliente"
          />
        </a>

        <a
          class="banner-link"
          href="https://diagnostico.wesellsoftware.com.br"
          target="_blank"
          rel="noopener noreferrer"
          data-banner="Diagnostico"
          aria-label="Faça o diagnóstico gratuito da sua empresa"
        >
          <img
            src="./assets/image copy 2.png"
            alt="Sua empresa está preparada para escalar? Diagnóstico WeSell gratuito"
          />
        </a>
      </nav>

      <a
        class="cta"
        href="https://www.instagram.com/wesellsoftware/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img src="./assets/image copy.png" alt="De ponta a ponta" />
      </a>
    </main>

    <div
      class="modal"
      id="waitlist-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="waitlist-title"
      hidden
    >
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-panel" role="document">
        <button
          type="button"
          class="modal-close"
          data-close-modal
          aria-label="Fechar"
        >
          ×
        </button>

        <div class="modal-content" id="waitlist-form-view">
          <img
            class="modal-logo"
            src="./assets/Entregaveis-53.png"
            alt="We"
          />
          <h2 id="waitlist-title">Lista de espera</h2>
          <p class="modal-copy">
            Inscreva-se para garantir acesso antecipado e descontos
            imperdíveis.
          </p>

          <form class="waitlist-form" id="waitlist-form" novalidate>
            <label class="field">
              <span>Nome</span>
              <input
                type="text"
                name="name"
                autocomplete="name"
                placeholder="Seu nome completo"
                required
              />
            </label>

            <label class="field">
              <span>E-mail</span>
              <input
                type="email"
                name="email"
                autocomplete="email"
                placeholder="seu@email.com"
                required
              />
            </label>

            <label class="field">
              <span>Telefone</span>
              <input
                type="tel"
                name="phone"
                id="waitlist-phone"
                autocomplete="tel"
                inputmode="tel"
                placeholder="(00) 00000-0000"
                required
              />
            </label>

            <p class="form-error" id="waitlist-error" hidden></p>

            <button type="submit" class="submit-btn">
              Quero me inscrever
            </button>
          </form>
        </div>

        <div class="modal-content modal-success" id="waitlist-success-view" hidden>
          <p class="modal-eyebrow">Inscrição confirmada</p>
          <h2>Você está na lista!</h2>
          <p class="modal-copy">
            Em breve você receberá novidades e condições exclusivas da We
            Education.
          </p>
          <button type="button" class="submit-btn" data-close-modal>
            Fechar
          </button>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
